<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>斗地主 - 经典三人卡牌对战</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 登录界面 -->
  <div id="loginScreen" class="screen">
    <div class="login-card">
      <div class="login-icon">🃏</div>
      <h1>斗地主</h1>
      <p class="login-subtitle">经典三人卡牌对战 · 手机畅玩</p>
      <input id="nameInput" type="text" placeholder="输入你的昵称" maxlength="12" autocomplete="off">
      <button id="joinBtn" class="btn btn-primary">进入游戏</button>
    </div>
  </div>

  <!-- 游戏主界面 -->
  <div id="gameScreen" class="screen" style="display:none">
    <!-- 顶部信息栏 -->
    <div class="top-bar">
      <div class="room-info" id="roomInfo">房间: ---</div>
      <div class="multiplier" id="multiplierDisplay">1倍</div>
    </div>

    <!-- 牌桌区域 -->
    <div class="table">
      <!-- 上家区域 -->
      <div class="player-area player-top" id="playerTop">
        <div class="player-avatar">
          <div class="avatar-circle" id="topAvatar">?</div>
          <div class="player-name" id="topName">等待加入</div>
        </div>
        <div class="player-cards-mini" id="topCardsMini"></div>
        <div class="landlord-badge" id="topLandlord" style="display:none">地主</div>
        <div class="action-badge" id="topAction"></div>
      </div>

      <!-- 中间对战区 -->
      <div class="battle-area">
        <!-- 上家出牌 -->
        <div class="played-zone" id="topPlayedZone"></div>
        <!-- 底牌 -->
        <div class="bottom-cards-zone" id="bottomCardsZone"></div>
        <!-- 下家出牌（右侧玩家，这里简化到同一区域） -->
        <div class="played-zone" id="rightPlayedZone" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);writing-mode:vertical-rl;"></div>
      </div>

      <!-- 右侧玩家小标识（下家） -->
      <div class="player-area player-right" id="rightPlayerArea">
        <div class="player-avatar">
          <div class="avatar-circle" id="rightAvatar">?</div>
          <div class="player-name" id="rightName">等待加入</div>
        </div>
        <div class="player-cards-mini" id="rightCardsMini"></div>
        <div class="landlord-badge" id="rightLandlord" style="display:none">地主</div>
        <div class="action-badge" id="rightAction"></div>
      </div>

      <!-- 自己区域 -->
      <div class="player-area player-bottom" id="playerBottom">
        <div class="player-info-row">
          <div class="player-avatar">
            <div class="avatar-circle self">我</div>
            <div class="player-name" id="myName">---</div>
          </div>
          <div class="landlord-badge" id="myLandlord" style="display:none">地主</div>
        </div>
        <div class="action-badge" id="myAction"></div>
      </div>
    </div>

    <!-- 手牌区域 -->
    <div class="hand-area" id="handArea">
      <div class="selected-cards" id="selectedCards"></div>
      <div class="hand-cards" id="handCards"></div>
    </div>

    <!-- 操作按钮 -->
    <div class="action-bar" id="actionBar">
      <button class="btn btn-hint" id="btnHint">提示</button>
      <button class="btn btn-play" id="btnPlay" disabled>出 牌</button>
      <button class="btn btn-pass" id="btnPass" disabled>不 出</button>
    </div>

    <!-- 叫地主区域 -->
    <div class="call-bar" id="callBar" style="display:none">
      <button class="btn btn-nocall" id="btnNoCall">不 叫</button>
      <button class="btn btn-call" id="btnCall">叫地主</button>
    </div>
  </div>

  <!-- 游戏结束弹窗 -->
  <div id="overlay" class="overlay" style="display:none">
    <div class="result-card" id="resultCard"></div>
  </div>

  <!-- 提示弹窗 -->
  <div id="toast" class="toast" style="display:none"></div>

  <script>
    // 横竖屏检测
    (function() {
      function updateOrientation() {
        var isLandscape = window.innerWidth > window.innerHeight;
        document.body.classList.toggle('landscape', isLandscape);
      }
      updateOrientation();
      window.addEventListener('resize', updateOrientation);
      window.addEventListener('orientationchange', function() {
        setTimeout(updateOrientation, 100);
      });
    })();
  </script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
